services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

    ports:
      - "8000:8000"

    volumes:
      - ./app:/workspace/app
      - ./tests:/workspace/tests

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
